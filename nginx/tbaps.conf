# ==============================================================================
# TBAPS Nginx Configuration — HTTP (no SSL required to start)
# SSL can be added later via: sudo bash scripts/ssl-setup.sh <domain>
# Place at: /etc/nginx/sites-available/tbaps.conf
# ==============================================================================

# Upstream backend
upstream tbaps_api {
    server 127.0.0.1:8000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

# ── HTTP server (works immediately, no certs needed) ──────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Logging ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/tbaps-access.log combined;
    error_log  /var/log/nginx/tbaps-error.log warn;

    # ── Limits ─────────────────────────────────────────────────────────────────
    client_max_body_size 10M;
    client_body_timeout  30s;
    client_header_timeout 30s;
    send_timeout         30s;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Frontend static files ──────────────────────────────────────────────────
    root  /opt/tbaps/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Cache hashed assets aggressively (Vite adds content hash to filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Backend API proxy ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://tbaps_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ── Health endpoints ───────────────────────────────────────────────────────
    location ~ ^/(health|readiness)$ {
        proxy_pass         http://tbaps_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Block Prometheus metrics from public access ────────────────────────────
    location /metrics {
        deny all;
        return 403;
    }

    # ── Allow Let's Encrypt ACME challenge (for future SSL setup) ─────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Block hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}

