# ==============================================================================
# TBAPS — Nginx Configuration (Docker context)
# Used INSIDE the Dockerfile.dashboard container.
# Serves the React build and proxies /api/ → api:8000
# ==============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Run as non-root — write temp files to /tmp
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name _;

        # ── Security Headers ───────────────────────────────────────────────────
        add_header X-Frame-Options        "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        client_max_body_size 10M;

        # ── React Frontend ─────────────────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Cache hashed assets permanently (Vite adds content hash to filenames)
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── API proxy → FastAPI backend container ──────────────────────────────
        location /api/ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── Health + Readiness probes ──────────────────────────────────────────
        location ~ ^/(health|readiness)$ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # ── Block Prometheus metrics from public access ────────────────────────
        location /metrics {
            deny all;
            return 403;
        }

        # ── Block hidden files ─────────────────────────────────────────────────
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
