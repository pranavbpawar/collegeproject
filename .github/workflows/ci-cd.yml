name: TBAPS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ============================================================================
  # BACKEND TESTS
  # ============================================================================
  
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tbaps_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-timeout
      
      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/tbaps_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test_secret_key
          ENCRYPTION_KEY: test_encryption_key_32_bytes_long
          CELERY_BROKER_URL: redis://localhost:6379/2
          CELERY_RESULT_BACKEND: redis://localhost:6379/3
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
        run: |
          cd backend
          pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term
      
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/tbaps_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test_secret_key
          ENCRYPTION_KEY: test_encryption_key_32_bytes_long
          CELERY_BROKER_URL: redis://localhost:6379/2
          CELERY_RESULT_BACKEND: redis://localhost:6379/3
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
        run: |
          cd backend
          pytest tests/integration/ -v
      
      - name: Run accuracy tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/tbaps_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test_secret_key
          ENCRYPTION_KEY: test_encryption_key_32_bytes_long
          CELERY_BROKER_URL: redis://localhost:6379/2
          CELERY_RESULT_BACKEND: redis://localhost:6379/3
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
        run: |
          cd backend
          pytest tests/accuracy/ -v
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
      
      - name: Check coverage threshold
        run: |
          cd backend
          coverage report --fail-under=80
  
  # ============================================================================
  # FRONTEND TESTS
  # ============================================================================
  
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
  
  # ============================================================================
  # LINTING AND CODE QUALITY
  # ============================================================================
  
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install linting tools
        run: |
          pip install flake8 black isort mypy
      
      - name: Run flake8
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --exclude=migrations
      
      - name: Run black
        run: |
          cd backend
          black --check app/
      
      - name: Run isort
        run: |
          cd backend
          isort --check-only app/
      
      - name: Run mypy
        run: |
          cd backend
          mypy app/ --ignore-missing-imports
  
  # ============================================================================
  # SECURITY SCANNING
  # ============================================================================
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Run Bandit security scan
        run: |
          pip install bandit
          cd backend
          bandit -r app/ -f json -o bandit-report.json
      
      - name: Run Safety check
        run: |
          pip install safety
          cd backend
          safety check --json
      
      - name: Run npm audit
        run: |
          cd frontend
          npm audit --audit-level=moderate
  
  # ============================================================================
  # BUILD AND DEPLOY
  # ============================================================================
  
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, code-quality]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Build Docker images
        run: |
          docker-compose -f docker-compose.production.yml build
      
      - name: Run smoke tests
        run: |
          docker-compose -f docker-compose.production.yml up -d
          sleep 30
          curl -f http://localhost:8000/health || exit 1
          docker-compose -f docker-compose.production.yml down
      
      - name: Push to registry (if main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Pushing to container registry..."
          # Add your registry push commands here
