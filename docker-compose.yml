# ==============================================================================
# TBAPS — Local Development Docker Compose
# Provides PostgreSQL + Redis for local backend development.
# The FastAPI backend and React frontend run NATIVELY (not in Docker).
#
# Usage:
#   docker compose up -d          → Start DB + Redis in background
#   docker compose down            → Stop services
#   docker compose down -v         → Stop + wipe volumes (fresh start)
#
# After starting, run:
#   cd backend && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
#   cd frontend && npm run dev
# ==============================================================================

version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: tbaps_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ztuser
      POSTGRES_PASSWORD: ztpass123
      POSTGRES_DB: zerotrust
    ports:
      - "5432:5432"    # Exposed to host — backend connects via localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ztuser -d zerotrust"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tbaps_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"    # Exposed to host — backend connects via localhost:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Optional: pgAdmin for DB inspection (visit http://localhost:5050)
  # Uncomment if needed
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: tbaps_pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@tbaps.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
  redis_data:
