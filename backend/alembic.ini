# Alembic Configuration for TBAPS Backend
# See: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template for naming revision files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Max count of revision files we would keep
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command, regardless
# of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file to be
# detected as revisions in the versions/ directory
# sourceless = false

# Version location specification
# version_locations = %(here)s/bar:%(here)s/foo:%(here)s/alembic/versions

# The output encoding used when revision files are written from script.mako;
# defaults to utf-8.
# output_encoding = utf-8

# Database URL — reads from environment so no secrets are hardcoded
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# post_write_hooks are the hooks that get run after a file is created by 'revision'.
# hooks = autopep8
# autopep8.type = exec
# autopep8.entrypoint = autopep8
# autopep8.options = -i REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
