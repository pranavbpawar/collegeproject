[pytest]
# Pytest configuration for TBAPS

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 3.9

# Test paths
testpaths = tests

# Add current directory to Python path
pythonpath = .

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, require services)
    accuracy: Accuracy validation tests
    performance: Performance benchmark tests
    slow: Slow running tests
    asyncio: Async tests
    database: Tests requiring database
    api: API endpoint tests

# Coverage options
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    --color=yes

# Async test configuration
asyncio_mode = auto

# Timeout for tests (seconds)
timeout = 300

# Parallel execution
# addopts = -n auto  # Uncomment to enable parallel testing

# Coverage configuration
[coverage:run]
source = app
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */migrations/*
    */alembic/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
